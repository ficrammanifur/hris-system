name: mobile_flutter
description: HRIS Mobile Application for Employees
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: 3.29.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0
  
  # Local Storage
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4
  
  # Location
  geolocator: ^13.0.3
  geocoding: ^3.0.0
  
  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  flutter_native_splash: ^2.4.4
  
  # Notifications
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  # Untuk sementara, nonaktifkan font custom
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

flutter_native_splash:
  color: "#3B82F6"
  image: assets/icons/splash_logo.png
  android: true
  ios: true